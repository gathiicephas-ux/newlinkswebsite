<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Links Valuers and Assessors logo">
  <circle cx="60" cy="60" r="57" fill="#ffffff" stroke="#1B5E20" stroke-width="3"/>
  <g fill="none" stroke-width="14" stroke-linecap="round">
    <!-- base loops: orange (left), green (right) -->
    <circle cx="40" cy="60" r="24" stroke="#F0791A"/>
    <circle cx="80" cy="60" r="24" stroke="#7CB342"/>
    <!-- TOP crossing: orange woven OVER green -->
    <path d="M52.72 39.65 A24 24 0 0 1 63.6 55.83" stroke="#ffffff" stroke-width="20"/>
    <path d="M52.72 39.65 A24 24 0 0 1 63.6 55.83" stroke="#F0791A"/>
    <!-- BOTTOM crossing: green woven OVER orange -->
    <path d="M67.28 80.35 A24 24 0 0 1 56.37 64.17" stroke="#ffffff" stroke-width="20"/>
    <path d="M67.28 80.35 A24 24 0 0 1 56.37 64.17" stroke="#7CB342"/>
  </g>
</svg>
